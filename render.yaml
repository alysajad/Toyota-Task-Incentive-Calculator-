# Render Blueprint — one-click API + Postgres provisioning.
# Deploy: push to GitHub, then New → Blueprint and point at this repo.
# (The React SPA deploys separately on Vercel — see README.)
services:
  - type: web
    name: nippon-incentive-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false # set to your Render host, e.g. nippon-incentive-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: CACHE_URL
        sync: false # optional Redis URL; blank falls back to per-process cache
      - key: DATABASE_URL
        fromDatabase:
          name: nippon-incentive-db
          property: connectionString
      # Demo logins for evaluators. These match the README "Demo credentials"
      # table so the deployed app accepts the documented logins. They are
      # seeded as password hashes and never exposed by the API. Change them
      # (and update the README) for a private deployment.
      - key: DEMO_ADMIN_EMAIL
        value: admin@nippon.test
      - key: DEMO_ADMIN_PASSWORD
        value: Admin@12345
      - key: DEMO_OFFICER_PASSWORD
        value: Officer@12345

databases:
  - name: nippon-incentive-db
    plan: free
